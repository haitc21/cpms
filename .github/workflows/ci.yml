name: cpms-ci

on:
  push:
    branches: [main, sprint-0]
  pull_request:

concurrency:
  group: cpms-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: cpms
          POSTGRES_USER: cpms
          POSTGRES_PASSWORD: cpms_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cpms -d cpms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      rabbitmq:
        image: rabbitmq:4.1-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: cmp
          RABBITMQ_DEFAULT_PASS: cmp_ci_password
          RABBITMQ_DEFAULT_VHOST: cmp
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 12

    env:
      CPMS_ENVIRONMENT: test
      CPMS_DATABASE_URL: postgresql+psycopg://cpms:cpms_ci_password@127.0.0.1:5432/cpms
      CPMS_RABBITMQ_URL: amqp://cmp:cmp_ci_password@127.0.0.1:5672/cmp
      CPMS_RUN_INTEGRATION: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Verify lockfile install
        run: uv sync --frozen --all-extras

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run mypy

      - name: Unit and integration tests
        run: uv run pytest -q

      - name: Migration check
        run: uv run alembic upgrade head

      - name: Contract validation
        run: uv run python -m cpms.contracts.validate_contracts

      - name: Secret scan
        run: >
          uv run python -m detect_secrets scan
          --baseline .secrets.baseline
          --exclude-files "(?i)(.*\\.venv/.*|.*uv\\.lock$|.*\\.git/.*)"

      - name: Docker image build
        run: docker build -t cpms:ci .
